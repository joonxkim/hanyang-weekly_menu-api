name: Update Cafeteria Menu

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

# 👇 이 두 줄을 새로 추가해 줍니다! (모든 부품을 최신 Node 24 엔진으로 강제 실행)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요한 부품(라이브러리) 설치하기
        run: pip install -r requirements.txt

      - name: 학식 가져오는 파이썬 코드 실행!
        run: python cafeteria.py

      - name: 생성된 JSON 파일을 깃허브에 저장(Commit & Push)하기
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add weekly_menu.json # 👈 여기를 weekly_menu.json으로 변경!
          git commit -m "Auto Update Weekly Menu Data" || echo "No changes to commit"
          git push
